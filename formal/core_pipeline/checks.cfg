[options]
isa rv32i

[depth]
insn      20
reg  5    20
causal 10 30
cover 1   20
csrw      20
csr_ill   20

[defines]
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_CSR_MSTATUS
`define RISCV_FORMAL_CSR_MTVEC
`define RISCV_FORMAL_CSR_MSCRATCH
`define RISCV_FORMAL_CSR_MEPC
`define RISCV_FORMAL_CSR_MCAUSE
`define RISCV_FORMAL_CSR_MTVAL

[csrs]
mstatus
mtvec
mscratch
mepc
mcause
mtval

# Illegal CSR access — must always trap. Format: addr  modes  ops
# Validates that priv-violating access (M-mode CSR from U/S) and
# unimplemented-CSR access (F15/7B0/etc) raise illegal-instruction.
[illegal_csrs]
300     us      rw
180     u       rw
F15     msu     rw
7B0     msu     rw

[script-defines]
verilog_defaults -add -I@basedir@/../../rtl/core

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/../../rtl/core/alu.sv
@basedir@/../../rtl/core/imm_gen.sv
@basedir@/../../rtl/core/regfile.sv
@basedir@/../../rtl/core/csr.sv
@basedir@/../../rtl/core/mul_unit.sv
@basedir@/../../rtl/core/div_unit.sv
@basedir@/../../rtl/core/core_pipeline.sv

[cover]
always @* if (!reset) cover (channel[0].cnt_insns == 2);
